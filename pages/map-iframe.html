<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @font-face {
            font-family: main-font;
            src: url(../assets/Fonts/noto-serif.regular.ttf);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            overflow-y: visible;
        }

        body::-webkit-scrollbar {
            display: none;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: auto;
            user-select: none;
        }

        #iframe-container {
            transform-origin: left top;
            transition: 0.4s;
        }

        #map-dark {
            position: absolute;
            width: 100%;
            opacity: 1;
            transition: 0.4s;
        }

        #map-light {
            position: absolute;
            width: 100%;
            opacity: 0;
            transition: 0.4s;
        }

        #zoom-in:hover {
            transform: scale(0.94)
        }

        #zoom-in:active {
            background-color: #b39254;
        }

        #zoom-out:hover {
            transform: scale(0.94)
        }

        #zoom-out:active {
            background-color: #b39254;
        }

        #zoom-btn {
            position: fixed;
            display: flex;
            flex-direction: column;
            gap: 3vh;
            margin-left: 2%;
            top: 2vh;
        }

        #zoom-btn button {
            position: sticky;
            width: 5vw;
            height: 5vw;
            background-color: #c5a059;
            border-radius: 20%;
            border: none;
            font-size: 4vw;
            color: #4e3700;
            cursor: pointer;
            transition: 0.3s;
        }

        #pyramid {
            position: absolute;
            display: flex;
            width: 7%;
            cursor: pointer;
            margin-left: 49%;
            margin-top: 16%;
            opacity: 1;
            transition: 0.4s;
        }

        #pyramid2 {
            position: absolute;
            display: flex;
            width: 7%;
            filter: drop-shadow(0 0 20px #281d14);
            cursor: pointer;
            margin-left: 49%;
            margin-top: 16%;
            opacity: 0;
        }

        #pyramid-p {
            position: absolute;
            color: #e7c075;
            margin-top: 21%;
            margin-left: 50%;
            font-family: main-font;
            font-size: 14px;
            opacity: 0;
            transition: 0.4s;
            text-shadow: 0 0 10px #e7c075;
            text-align: center;
        }

        #pyramid:hover + #pyramid-p, #pyramid.active + #pyramid-p {
            opacity: 1;
        }

        #pyramid:hover,
        #pyramid.active {
            filter: drop-shadow(0 0 10px #b39254);
            scale: 1.1;
        }

        #siwa {
            position: absolute;
            display: flex;
            width: 4.5%;
            cursor: pointer;
            margin-top: 18%;
            margin-left: 7%;
            opacity: 1;
            transition: 0.4s;
        }

        #siwa2 {
            position: absolute;
            display: flex;
            width: 4.5%;
            filter: drop-shadow(0 0 10px #281d14);
            cursor: pointer;
            margin-top: 18%;
            margin-left: 7%;
            opacity: 0;
        }

        #siwa-p {
            position: absolute;
            color: #e7c075;
            text-shadow: 0 0 10px #e7c075;
            margin-top: 21%;
            margin-left: 11%;
            font-family: main-font;
            font-size: 14px;
            opacity: 0;
            transition: 0.4s;
        }

        #siwa:hover + #siwa-p , #siwa.active + #siwa-p {
            opacity: 1;
        }

        #siwa:hover,
        #siwa.active {
            filter: drop-shadow(0 0 10px #b39254);
            scale: 1.1;
        }

        #bahariya {
            position: absolute;
            display: flex;
            width: 4.5%;
            cursor: pointer;
            margin-top: 25%;
            margin-left: 30%;
            opacity: 1;
            transition: 0.4s;
        }

        #bahariya2 {
            position: absolute;
            display: flex;
            width: 4.5%;
            filter: drop-shadow(0 0 10px #281d14);
            cursor: pointer;
            margin-top: 25%;
            margin-left: 30%;
            opacity: 0;
        }

        #bahariya-p {
            position: absolute;
            color: #e7c075;
            text-shadow: 0 0 10px #e7c075;
            margin-top: 28%;
            margin-left: 34%;
            font-family: main-font;
            font-size: 14px;
            opacity: 0;
            transition: 0.4s;
        }

        #bahariya:hover + #bahariya-p, #bahariya.active + #bahariya-p {
            opacity: 1;
        }

        #bahariya:hover,
        #bahariya.active {
            filter: drop-shadow(0 0 10px #b39254);
            scale: 1.1;
        }

        #farafra {
            position: absolute;
            display: flex;
            width: 4.5%;
            cursor: pointer;
            margin-top: 33%;
            margin-left: 24%;
            opacity: 1;
            transition: 0.4s;
        }
        
        #farafra2 {
            position: absolute;
            display: flex;
            width: 4.5%;
            filter: drop-shadow(0 0 10px #281d14);
            cursor: pointer;
            margin-top: 33%;

        }

        #farafra-p {

            opacity: 0;
            transition: 0.4s;
        }

        #farafra:hover + #farafra-p, #farafra.active + #farafra-p {

        }

        #farafra:hover,
        #farafra.active {

        }


        #dakhla {

            display: flex;
            width: 4.5%;
            cursor: pointer;
            margin-top: 41%;

            opacity: 1;
            transition: 0.4s;
        }

        #dakhla2 {
            position: absolute;
            display: flex;
            width: 4.5%;
            filter: drop-shadow(0 0 10px #281d14);
            cursor: pointer;
            margin-top: 41%;
            transition: 0.4s;
            margin-left: 37%;
            opacity: 0;
        }

        #dakhla-p {
            position: absolute;
            color: #e7c075;
            text-shadow: 0 0 10px #e7c075;
            margin-top: 44%;
            margin-left: 31%;
            font-family: main-font;
            font-size: 14px;
            opacity: 0;
            transition: 0.4s;
        }

        #dakhla:hover + #dakhla-p, #dakhla.active + #dakhla-p {
            opacity: 1;
        }

        #dakhla:hover,
        #dakhla.active {
            filter: drop-shadow(0 0 10px #b39254);
            scale: 1.1;
        }

        #kharga {
            position: absolute;
            display: flex;
            width: 4.5%;
            cursor: pointer;
            margin-top: 41%;
            margin-left: 46%;
            opacity: 1;
            transition: 0.4s;
        }

        #kharga2 {
            position: absolute;
            display: flex;
            width: 4.5%;
            filter: drop-shadow(0 0 10px #281d14);
            cursor: pointer;
            margin-top: 41%;
            margin-left: 46%;
            opacity: 0;
            transition: 0.4s;
        }

        #kharga-p {
            position: absolute;
            color: #e7c075;
            text-shadow: 0 0 10px #e7c075;
            margin-top: 44%;
            margin-left: 50%;
            font-family: main-font;
            font-size: 14px;
            opacity: 0;

        }

        #kharga:hover + #kharga-p, #kharga.active + #kharga-p {

        }

        #kharga:hover,

        #abu-simbel {

            display: flex;
            width: 5%;

            margin-top: 59%;
            margin-left: 58%;
            opacity: 1;
        }

        #abu-simbel2 {

            display: flex;
            width: 5%;
            filter: drop-shadow(0 0 10px #513a27b0);
            cursor: pointer;
            margin-top: 59%;

        }

        #abu-simbel-p {
            position: absolute;
            color: #e7c075;
            text-shadow: 0 0 10px #e7c075;
            margin-top: 65%;

            font-size: 14px;
            opacity: 0;
            transition: 0.2s;
        }

        #abu-simbel:hover + #abu-simbel-p, #abu-simbel.active + #abu-simbel-p {
            opacity: 1;
        }

        #abu-simbel:hover,
        #abu-simbel.active {
            filter: drop-shadow(0 0 10px #b39254);
            scale: 1.1;
        }

        #karnak {
            position: absolute;
            display: flex;
            width: 4%;
            cursor: pointer;
            margin-top: 42%;
            margin-left: 65%;
            opacity: 1;
            transition: 0.2s;
        }

        #karnak:hover,
        #karnak.active {
            filter: drop-shadow(0 0 10px #b39254);
            scale: 1.1;
        }


        #karnak2 {
            position: absolute;
            display: flex;
            width: 4%;
            filter: drop-shadow(0 0 10px #281d14);
            cursor: pointer;
            margin-top: 42%;
            margin-left: 65%;
            opacity: 0;
        }

        #karnak-p {
            position: absolute;
            color: #e7c075;
            text-shadow: 0 0 10px #e7c075;
            margin-top: 47%;
            margin-left: 64%;
            font-family: main-font;
            font-size: 14px;
            opacity: 0;
            transition: 0.2s;
        }

        #karnak:hover + #karnak-p, #karnak.active + #karnak-p {
            opacity: 1;
        }

        #icons-container img {
            transition: 0.2s;
        }
    </style>
</head>

<body>
    <div id="iframe-container">
        <img src="../assets/images/Map-imgs/dark-map.jpg" id="map-dark" draggable="false">
        <img src="../assets/images/Map-imgs/white-map.jpg" id="map-light" draggable="false">
        <div id="icons-container">
            <img src="../assets/images/Map-imgs/pyramids2.png" id="pyramid2" draggable="false">
            <img src="../assets/images/Map-imgs/pyramids.png" id="pyramid" onclick="selected(this.id)"
                draggable="false">
            <p id="pyramid-p">
                Great
                <br>
                Pyramid
            </p>
            <img src="../assets/images/Map-imgs/Trees2.png" id="siwa2" draggable="false">
            <img src="../assets/images/Map-imgs/Trees.png" id="siwa" onclick="selected(this.id)" draggable="false">
            <p id="siwa-p">Siwa</p>
            <img src="../assets/images/Map-imgs/Trees2.png" id="bahariya2" draggable="false">
            <img src="../assets/images/Map-imgs/Trees.png" id="bahariya" onclick="selected(this.id)" draggable="false">
            <p id="bahariya-p">Bahariya</p>
            <img src="../assets/images/Map-imgs/Trees2.png" id="farafra2" draggable="false">
            <img src="../assets/images/Map-imgs/Trees.png" id="farafra" onclick="selected(this.id)" draggable="false">
            <p id="farafra-p">Farafra</p>
            <img src="../assets/images/Map-imgs/Trees2.png" id="dakhla2" draggable="false">
            <img src="../assets/images/Map-imgs/Trees.png" id="dakhla" onclick="selected(this.id)" draggable="false">
            <p id="dakhla-p">Dakhla</p>
            <img src="../assets/images/Map-imgs/Trees2.png" id="kharga2" draggable="false">
            <img src="../assets/images/Map-imgs/Trees.png" id="kharga" onclick="selected(this.id)" draggable="false">
            <p id="kharga-p">Kharga</p>
            <img src="../assets/images/Map-imgs/big-temple2.png" id="abu-simbel2" draggable="false">
            <img src="../assets/images/Map-imgs/big-temple.png" id="abu-simbel" onclick="selected(this.id)"
                draggable="false">
            <p id="abu-simbel-p">Abu Simbel</p>
            <img src="../assets/images/Map-imgs/small-temple2.png" id="karnak2" draggable="false">
            <img src="../assets/images/Map-imgs/small-temple.png" id="karnak" onclick="selected(this.id)"
                draggable="false">
            <p id="karnak-p">El Karnak</p>
        </div>
    </div>
    <div id="zoom-btn">
        <button id="zoom-in" onclick="zoomIn()">+</button>
        <button id="zoom-out" onclick="zoomout()">-</button>
    </div>
    <script src="../js/map.js"></script>
</body>

</html>
