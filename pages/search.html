<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ancient Heritage | Search</title>
    <link rel="stylesheet" href="../css/main.css">

    <script src="https://kit.fontawesome.com/728f1f9039.js" crossorigin="anonymous"></script>
    <!-- Icons file -->
    <link rel="stylesheet" href="../css/all.min.css">

    <link rel="stylesheet" href="../css/search.css">

</head>

<body>
    <div id="nav-bar">
        <nav>
            <div id="nav-text">
                ANCIENT HERITAGE
            </div>
            <div id="nav-links">
                <a href="../index.html">Home</a>
                <a href="archive.html">Archive</a>
                <a href="museums.html">Museum</a>
                <a href="map.html">Map</a>
                <a href="search.html" class="active">Search</a>
            </div>
            <div id="sign">
                <div id="mode-btn" onclick="changeMod(); searchMod();">
                    <svg viewBox="0 -960 960 960">
                        <path
                            d="M480-120q-150 0-255-105T120-480q0-150 105-255t255-105q14 0 27.5 1t26.5 3q-41 29-65.5 75.5T444-660q0 90 63 153t153 63q55 0 101-24.5t75-65.5q2 13 3 26.5t1 27.5q0 150-105 255T480-120Zm0-80q88 0 158-48.5T740-375q-20 5-40 8t-40 3q-123 0-209.5-86.5T364-660q0-20 3-40t8-40q-78 32-126.5 102T200-480q0 116 82 198t198 82Zm-10-270Z" />
                    </svg>
                </div>
                <a id="sign-btn" href="sign-up.html">Sign up</a>
                <a id="icon" class="icon" href="profile.html"><i class="fa-solid fa-circle-user"></i></a>
            </div>
        </nav>
    </div>
    <main>
        <div class="search-window">
            <input type="search" id="search-input" placeholder="Search By Artifact Name Or Museum..." autocomplete="off">
            <button id="search">Excute Search</button>
        </div>
        <div class="filters">
            <div class="categories">
                <button class="button-value" onclick="filterArtifacts('All Museums')">All Museums</button>
                <button class="button-value" onclick="filterArtifacts('Grand Egyptian Museum')">Grand Egyptian
                    Museum</button>
                <button class="button-value" onclick="filterArtifacts('Egyptian Museum')">Egyptian Museum</button>
                <button class="button-value" onclick="filterArtifacts('NMEC')">NMEC</button>
                <button class="button-value" onclick="filterArtifacts('Coptic Musuem')">Coptic Musuem</button>
                <button class="button-value" onclick="filterArtifacts('Islamic Art Museum')">Islamic Art Museum</button>
                <button class="button-value" onclick="filterArtifacts('Other')">Other</button>
            </div>
            <div class="filter-show">
                <span id="grid" onclick="showMethodActive('grid'); cardDisplay('grid') "><i
                        class="fa-solid fa-grip"></i> Grid</span>
                <span id="list" onclick="showMethodActive('list'); cardDisplay('list') "><i
                        class="fa-solid fa-list"></i> List</span>
            </div>
        </div>
        <h1 class="search-header">Search Results:</h1>
        <div id="artifacts-container">

        </div>
    </main>
    <footer id="footer">
        <div id="copy-right">
            <h5>

            </p>
        </div>
        <div id="footer-links">
            <a href="https://www.capu.edu.eg/index.php/ar/" target="_blank">University site</a>
            <a href="feedback.html">Feed Back</a>
            <a href="about.html">About Us</a>
        </div>
    </footer>
    <script src="../js/main.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/search.js"></script>
</body>

</html>
